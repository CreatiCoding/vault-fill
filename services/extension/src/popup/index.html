<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault Fill</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --danger: #ef4444;
        --success: #22c55e;
        --radius: 8px;
      }

      body {
        width: 360px;
        min-height: 200px;
        max-height: 560px;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
